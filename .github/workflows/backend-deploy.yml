name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:
    inputs:
      stage:
        description: "Deployment stage"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: Deploy Lambda services via Serverless Framework
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for OIDC-based AWS auth
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Reuses the same OIDC role the frontend deploy uses. The role
          # needs enough permissions to create/update Lambda, API Gateway,
          # IAM, CloudFormation, S3 (artifacts), CloudWatch Logs, and EC2
          # ENIs (for VPC-attached Lambdas). AdministratorAccess on the dev
          # account is the simplest path; tighten later if needed.
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy backend
        # Use the workspace-level `deploy:<stage>` scripts directly because the
        # npm-workspace passthrough strips `-- --stage dev` somewhere between
        # the root, the workspace shim, and serverless itself. The workspace
        # has hardcoded scripts (deploy:dev, deploy:prod) so we route via
        # those instead.
        run: npm run deploy:${{ github.event.inputs.stage || 'dev' }} --workspace=@caresync/backend
        env:
          # Serverless Framework v4 requires an access key for non-interactive
          # CLI use. Generate one at https://app.serverless.com/ → Org
          # Settings → Access Keys, then store the value as a GitHub secret.
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
          NODE_ENV: production
