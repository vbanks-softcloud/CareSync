name: Frontend Deploy

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:

concurrency:
  group: frontend-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ca-central-1

jobs:
  deploy:
    name: Build & deploy frontend to S3 + CloudFront
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for OIDC-based AWS auth

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          # Cognito wiring (these are public, browser-side config values, but we
          # still source them from GitHub Secrets so they're easy to rotate).
          # If a secret is missing, the build still succeeds and the SPA falls
          # back to its local-mock auth.
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_USER_POOL_CLIENT_ID: ${{ secrets.VITE_COGNITO_USER_POOL_CLIENT_ID }}
          VITE_COGNITO_REGION: ${{ secrets.VITE_COGNITO_REGION }}
          # API Gateway URL for caresync-backend (e.g. https://xyz.execute-api.us-east-1.amazonaws.com).
          # The dashboard fetches patients/notes from here at runtime. If this
          # is missing, the dashboard surfaces an "API not configured" error
          # rather than silently falling back to localStorage.
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build:frontend

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Hashed asset files: long cache, browser can keep them forever.
      - name: Sync hashed assets to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.FRONTEND_BUCKET }} \
            --delete \
            --exclude "index.html" \
            --exclude "*.html" \
            --cache-control "public,max-age=31536000,immutable"

      # HTML entry points: never cache, so new releases roll out immediately.
      - name: Sync HTML entry points to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.FRONTEND_BUCKET }} \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} \
            --paths "/*"
