service: caresync-backend

frameworkVersion: "4"

# Serverless v4 ships with its own ESBuild integration that conflicts with
# the `serverless-esbuild` plugin below. We keep the plugin (rather than
# migrating) because we rely on its `loader: { .sql: text }` config to
# bundle migration SQL files into the Lambda artifact.
build:
  esbuild: false

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, 'us-east-1'}
  stage: ${opt:stage, 'dev'}
  memorySize: 512
  timeout: 10
  environment:
    NODE_ENV: ${self:provider.stage}
    STAGE: ${self:provider.stage}
    # DB connectivity — DB_SECRET_ID is the Secrets Manager secret that
    # RDS auto-creates when "Manage master credentials in AWS Secrets
    # Manager" is enabled on the instance. It holds { username, password,
    # engine, host, port, dbname } as JSON. DB_HOST is also in the secret
    # but we pin it here so a stage swap doesn't require editing the
    # secret. DB_NAME is "caresync" by default (RDS-managed secrets often
    # leave dbname blank).
    DB_HOST: ${env:DB_HOST, 'caresync-db.cmf2m8o2079n.us-east-1.rds.amazonaws.com'}
    DB_NAME: caresync
    DB_SECRET_ID: ${env:DB_SECRET_ID, 'arn:aws:secretsmanager:us-east-1:810738286523:secret:rds!db-9eb52667-87ac-4e3f-8835-48c06143f5f4-qYdYRe'}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - secretsmanager:GetSecretValue
          Resource:
            - 'arn:aws:secretsmanager:us-east-1:810738286523:secret:rds!db-9eb52667-87ac-4e3f-8835-48c06143f5f4-qYdYRe'
  # Lambdas attach to the same VPC as the RDS instance so they can reach it
  # over the private network. Subnet IDs + security group come from the
  # `vpc` custom block below so they're declared once.
  vpc:
    securityGroupIds: ${self:custom.vpc.securityGroupIds}
    subnetIds: ${self:custom.vpc.subnetIds}

plugins:
  - serverless-esbuild
  - serverless-offline

custom:
  vpc:
    # The two private subnets in vpc-07191e25f3dcbb9a0. Lambdas spread
    # across both AZs for HA. The Secrets Manager VPC interface endpoint
    # must also live in these subnets — otherwise calls hang.
    subnetIds:
      - subnet-02815bff0638b46fd # CareSync-subnet-private1-us-east-1a
      - subnet-008ee70de777cc0d5 # CareSync-subnet-private2-us-east-1b
    # Shared SG used by Lambdas, the RDS SG inbound rule (port 3306), and
    # the Secrets Manager VPC endpoint. Requires a self-referencing
    # inbound 443 rule so Lambda ENIs in this SG can reach the endpoint
    # ENI in this same SG.
    securityGroupIds:
      - sg-0ba39216c69b6f0c6
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    concurrency: 10
    # Bundle .sql files as plain string imports. Used by handlers/applyMigration.ts
    # to embed the schema files at build time.
    loader:
      .sql: text

functions:
  health:
    handler: src/handlers/health.handler
    events:
      - httpApi:
          path: /health
          method: get

  # One-shot migration runner. No HTTP event — invoke manually via the AWS
  # console or `sls invoke -f applyMigration -d '{"file":"001_initial_mysql_schema.sql"}'`.
  applyMigration:
    handler: src/handlers/applyMigration.handler
    timeout: 60 # schema apply can take a few seconds; give it room

# Future functions (uncomment and implement when ready):
#  cognitoPostConfirmation:
#    handler: src/handlers/cognitoPostConfirmation.handler
